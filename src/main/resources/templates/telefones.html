<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" ng-app="emergenciaApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telefones uteis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="HASH"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"
          integrity="HASH"
          crossorigin="anonymous">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<main class="app-shell">
    <header class="top-bar">
        <a th:href="@{/}" aria-label="Voltar"><i class="bi bi-arrow-left fs-4"></i></a>
        <h1 class="screen-title">Telefones uteis</h1>
        <span></span>
    </header>

    <section class="content">
        <div class="phone-row">
            <div>
                <strong>Emergencia medica</strong>
                <p class="mb-0 text-muted">SAMU</p>
            </div>
            <a class="phone-number text-decoration-none" href="tel:192">192</a>
        </div>

        <div class="phone-row">
            <div>
                <strong>Policia Militar</strong>
                <p class="mb-0 text-muted">Seguranca publica</p>
            </div>
            <a class="phone-number text-decoration-none" href="tel:190">190</a>
        </div>

        <div class="phone-row">
            <div>
                <strong>Bombeiros</strong>
                <p class="mb-0 text-muted">Incendios e resgates</p>
            </div>
            <a class="phone-number text-decoration-none" href="tel:193">193</a>
        </div>

        <a class="btn btn-outline-secondary w-100 mt-2" th:href="@{/}">Voltar</a>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/angular@1.8.3/angular.min.js"
        integrity="HASH"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
