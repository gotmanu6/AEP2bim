<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" ng-app="emergenciaApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Selecionar emergencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body ng-controller="EmergenciaController">
<main class="app-shell">
    <header class="top-bar">
        <a th:href="@{/}" aria-label="Voltar"><i class="bi bi-arrow-left fs-4"></i></a>
        <h1 class="screen-title">Tipo de emergencia</h1>
        <span></span>
    </header>

    <section class="content">
        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}">Erro</div>

        <form th:action="@{/chamados}" method="post">
            <div class="emergency-grid">
                <button class="emergency-card d-flex align-items-center"
                        type="button"
                        th:each="tipo : ${tiposEmergencia}"
                        th:attr="ng-click=|selecionarTipo('${tipo.name()}')|, ng-class=|{'active': chamado.tipo == '${tipo.name()}'}|">
                    <span class="emergency-icon"><i th:class="'bi ' + ${tipo.icone}"></i></span>
                    <span>
                        <strong th:text="${tipo.titulo}">Emergencia</strong><br>
                        <small class="text-muted" th:text="${tipo.descricao}">Descricao</small>
                    </span>
                </button>
            </div>

            <input type="hidden" name="tipo" ng-value="chamado.tipo">

            <div class="form-panel">
                <label class="form-label" for="endereco">Local do atendimento</label>
                <input class="form-control" id="endereco" name="endereco" ng-model="chamado.endereco" required>

                <label class="form-label mt-3" for="pessoaEnvolvida">Pessoa envolvida</label>
                <input class="form-control" id="pessoaEnvolvida" name="pessoaEnvolvida" ng-model="chamado.pessoaEnvolvida" placeholder="Nome ou nao informado">

                <label class="form-label mt-3" for="descricao">Descricao da ocorrencia</label>
                <textarea class="form-control" id="descricao" name="descricao" rows="3" ng-model="chamado.descricao" placeholder="Ex.: queda, fogo, dificuldade respiratoria"></textarea>
            </div>

            <div class="bottom-actions">
                <a class="btn btn-outline-secondary" th:href="@{/}">Voltar</a>
                <button class="btn btn-danger" type="submit" ng-disabled="!chamado.tipo">Abrir chamado</button>
            </div>
        </form>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/angular@1.8.3/angular.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
