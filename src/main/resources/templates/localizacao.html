<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" ng-app="emergenciaApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmar localizacao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body ng-controller="LocalizacaoController">
<main class="app-shell">
    <header class="top-bar">
        <a th:href="@{/}" aria-label="Voltar"><i class="bi bi-arrow-left fs-4"></i></a>
        <h1 class="screen-title">Confirmar localizacao</h1>
        <span></span>
    </header>

    <section class="content">
        <div class="location-box">
            <p class="text-muted mb-1">Endereco atual</p>
            <h2 class="h5 mb-3">{{enderecoAtual}}</h2>
            <div class="map-preview">
                <div class="text-center">
                    <i class="bi bi-pin-map-fill text-danger fs-1"></i>
                    <p class="mb-0 fw-semibold">Local encontrado pelo GPS</p>
                </div>
            </div>
        </div>

        <div class="form-panel" ng-show="editando">
            <label class="form-label" for="novoEndereco">Novo endereco</label>
            <input class="form-control" id="novoEndereco" ng-model="novoEndereco">
            <button class="btn btn-danger w-100 mt-3" type="button" ng-click="salvar()">Salvar local</button>
        </div>

        <div class="bottom-actions">
            <button class="btn btn-outline-danger" type="button" ng-click="alterar()">Alterar local</button>
            <button class="btn btn-danger" type="button" ng-click="confirmar()">Esta correto</button>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/angular@1.8.3/angular.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
