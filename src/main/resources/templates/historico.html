<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" ng-app="emergenciaApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<main class="app-shell">
    <header class="top-bar">
        <a th:href="@{/}" aria-label="Voltar"><i class="bi bi-arrow-left fs-4"></i></a>
        <h1 class="screen-title">Historico</h1>
        <span></span>
    </header>

    <section class="content">
        <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}">Mensagem</div>

        <article class="history-item" th:each="chamado : ${chamados}">
            <div class="d-flex justify-content-between gap-2">
                <strong th:text="'Chamado #' + ${chamado.id}">Chamado #1</strong>
                <span class="status-pill" th:classappend="${chamado.status == 'ABERTO'} ? ' open'" th:text="${chamado.status}">ABERTO</span>
            </div>
            <p class="mb-1 fw-semibold" th:text="${chamado.tipo.titulo}">Tipo</p>
            <p class="mb-1" th:text="${chamado.descricao}">Descricao</p>
            <small class="d-block text-muted" th:text="'Data e hora: ' + ${#temporals.format(chamado.dataHora, 'dd/MM/yyyy HH:mm')}">Data</small>
            <small class="d-block text-muted" th:text="'Pessoa: ' + ${chamado.pessoaEnvolvida}">Pessoa</small>
            <hr>
            <small class="d-flex gap-2"><i class="bi bi-geo-alt-fill text-danger"></i><span th:text="${chamado.endereco}">Endereco</span></small>
        </article>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/angular@1.8.3/angular.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
